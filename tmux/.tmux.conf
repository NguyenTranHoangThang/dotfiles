# ================================
# TMUX CONFIG
# ================================

# Improve colors
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Start windows at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Enable mouse support
set -g mouse on

# Better scrolling
set -g history-limit 50000

# Faster response
set -sg escape-time 0

# ================================
# PREFIX (Ctrl+a instead of Ctrl+b)
# ================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Move between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap panes
bind -r < swap-pane -D
bind -r > swap-pane -U

# ================================
# VI MODE
# ================================
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Copy to clipboard (macOS)
if -b "command -v pbcopy > /dev/null 2>&1" {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
}

# ================================
# STATUS BAR (Minimal)
# ================================
set -g status off
set -g status-position bottom
set -g status-interval 1

set -g status-style bg=colour235,fg=colour223
set -g status-left-length 50
set -g status-right-length 50

set -g status-left "#[fg=colour228,bg=colour239] #S #[fg=colour239,bg=colour235] "
set -g status-right "#[fg=colour228,bg=colour239] %H:%M:%S #[fg=colour239,bg=colour235] %d-%b-%Y "

setw -g window-status-format "#[fg=colour245,bg=colour235] #I: #W "
setw -g window-status-current-format "#[fg=colour235,bg=colour039,bold] #I: #W "
setw -g window-status-activity-style "bg=colour088,fg=colour229"
setw -g window-status-bell-style "bg=colour088,fg=colour229"

# ================================
# PLUGINS (TPM)
# ================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin settings
set -g @resurrect-strategy-nvim 'on'
set -g @continuum-restore 'on'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
